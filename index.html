<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>信託投保表格 填寫工具</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root{
    --ink:#1c1c1e;
    --sub:#6b6b70;
    --line:#e3e2df;
    --accent:#8b1a1a;
    --accent-ink:#ffffff;
    --bg:#faf9f7;
    --card:#ffffff;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; padding:0;
    background:var(--bg);
    font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Noto Sans TC",system-ui,sans-serif;
    color:var(--ink);
  }
  header{
    background:var(--accent);
    color:var(--accent-ink);
    padding:20px 18px 16px;
  }
  header h1{
    margin:0; font-size:18px; font-weight:600; letter-spacing:.3px;
  }
  header p{
    margin:6px 0 0; font-size:12.5px; opacity:.9; line-height:1.5;
  }
  main{
    max-width:640px; margin:0 auto; padding:16px 14px 100px;
  }
  .section{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:12px;
    padding:16px 16px 6px;
    margin-bottom:14px;
  }
  .section h2{
    font-size:14px; margin:0 0 12px; color:var(--accent);
    border-bottom:1px solid var(--line); padding-bottom:8px;
    font-weight:700;
  }
  .field{ margin-bottom:14px; }
  .field label{
    display:block; font-size:13px; color:var(--sub); margin-bottom:5px;
  }
  .field label .req{ color:var(--accent); }
  .field input, .field textarea{
    width:100%; padding:10px 11px; font-size:15px;
    border:1px solid #d6d5d1; border-radius:8px;
    background:#fff; color:var(--ink);
    font-family:inherit;
  }
  .field textarea{ resize:vertical; min-height:56px; }

input[type="date"]{
-webkit-appearance:none;
appearance:none;
min-width:0;
max-width:100%;
font-size:16px;
padding-right:8px;
}
.field{min-width:0;}
.two-col>.field{min-width:0;}

  .field input:focus, .field textarea:focus{
    outline:none; border-color:var(--accent);
  }
  .hint{ font-size:11.5px; color:#9a9a9a; margin-top:4px; }
  .two-col{ display:grid; grid-template-columns:1fr 1fr; gap:0 12px; }
  @media (max-width:420px){ .two-col{ grid-template-columns:1fr; } }

  .footer-bar{
    position:fixed; left:0; right:0; bottom:0;
    background:rgba(250,249,247,.96);
    backdrop-filter:blur(6px);
    border-top:1px solid var(--line);
    padding:10px 14px calc(10px + env(safe-area-inset-bottom));
  }
  .btn{
    display:block; width:100%; max-width:640px; margin:0 auto;
    background:var(--accent); color:#fff; border:none;
    padding:13px 16px; font-size:15px; font-weight:600;
    border-radius:10px; cursor:pointer;
  }
  .btn:disabled{ opacity:.6; }
  .btn.secondary{
    background:transparent; color:var(--accent);
    border:1px solid var(--accent); margin-top:8px;
  }
  #status{
    text-align:center; font-size:12.5px; color:var(--sub); margin-top:8px; min-height:16px;
  }
  #status.ok{ color:#1a7a3d; }
  #status.err{ color:#b3261e; }
  .progress-wrap{
    height:4px; background:#eee; border-radius:2px; overflow:hidden; margin-top:8px; display:none;
  }
  .progress-bar{
    height:100%; width:0%; background:var(--accent); transition:width .15s;
  }
  .footer-bar .btn + .btn{ margin-top:8px; }

  .preview-modal{
    display:none;
    position:fixed; inset:0; background:#efeeea; z-index:1000;
    flex-direction:column;
  }
  .preview-modal.open{ display:flex; }
  .preview-modal-header{
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 16px; background:var(--accent); color:#fff;
    font-size:14px; font-weight:600;
  }
  .preview-close{
    background:rgba(255,255,255,.15); color:#fff; border:1px solid rgba(255,255,255,.4);
    border-radius:6px; padding:6px 10px; font-size:12.5px;
  }
  .preview-pages{
    flex:1; overflow-y:auto; padding:14px; -webkit-overflow-scrolling:touch;
  }
  .preview-page-wrap{
    max-width:640px; margin:0 auto 16px; background:#fff;
    box-shadow:0 1px 4px rgba(0,0,0,.15); border-radius:4px; overflow:hidden;
  }
  .preview-page-wrap canvas{ display:block; width:100%; height:auto; }
  .preview-page-label{
    text-align:center; font-size:11px; color:var(--sub); margin:-4px 0 14px;
  }
</style>
</head>
<body>

<header>
  <h1>柏域信誠 · 信託投保表格填寫工具</h1>
  <p>填寫下方資料，系統會依原始範本格式自動套入對應欄位，並產生可下載的 PDF。不含「Grantor Declaration 客戶聲明」保單頁面。</p>
</header>

<main>

  <div class="section">
    <h2>基本資料 Personal</h2>
    <div class="field">
      <label>中文姓名</label>
      <input type="text" id="chineseName" placeholder="例：王小明">
    </div>
    <div class="field">
      <label>英文姓名</label>
      <input type="text" id="englishName" placeholder="例：Wang Xiao Ming">
    </div>
    <div class="two-col">
      <div class="field">
        <label>出生日期</label>
        <input type="date" id="dob" min="1900-01-01" max="2026-07-17">
      </div>
      <div class="field">
        <label>國籍 / 稅務居留地</label>
        <input type="text" id="nationality" value="台灣">
      </div>
    </div>
    <div class="field">
      <label>身分證字號 / 護照號碼（同時作為稅務編號 TIN）</label>
      <input type="text" id="idNumber" placeholder="例：A123456789">
    </div>
    <div class="two-col">
      <div class="field">
        <label>聯絡電話</label>
        <input type="text" id="contactNumber" placeholder="例：0912345678 或 +886912345678">
      </div>
      <div class="field">
        <label>電子郵件</label>
        <input type="text" id="email" placeholder="例：example@mail.com">
      </div>
    </div>
    <div class="field">
      <label>居住地址</label>
      <input type="text" id="address" placeholder="請輸入完整居住地址">
    </div>
  </div>

  <div class="section">
    <h2>職業資料 Occupation</h2>
    <div class="field">
      <label>職稱（Director / Owner / Position 名稱）</label>
      <input type="text" id="occupation" placeholder="例：Director 董事">
    </div>
    <div class="field">
      <label>行業別</label>
      <input type="text" id="industry" placeholder="例：科技業">
    </div>
    <div class="field">
      <label>公司名稱</label>
      <input type="text" id="companyName" placeholder="請輸入公司名稱">
    </div>
    <div class="field">
      <label>公司地址</label>
      <input type="text" id="companyAddress" placeholder="請輸入公司地址">
    </div>
  </div>

  <div class="section">
    <h2>受益人資料 Beneficiary（Appendix I）</h2>
    <div class="field">
      <label>受益人英文姓名</label>
      <input type="text" id="beneficiaryInfo" placeholder="例：John Wang">
    </div>
  </div>

</main>

<div class="footer-bar">
  <button class="btn" id="previewBtn">預覽</button>
  <button class="btn" id="generateBtn">產生填寫好的 PDF</button>
  <button class="btn secondary" id="resetBtn">清空重填</button>
  <div class="progress-wrap" id="progressWrap"><div class="progress-bar" id="progressBar"></div></div>
  <div id="status"></div>
</div>

<div id="previewModal" class="preview-modal">
  <div class="preview-modal-header">
    <span>預覽（共 8 頁）</span>
    <button id="closePreviewBtn" class="preview-close">關閉 ✕</button>
  </div>
  <div id="previewPages" class="preview-pages"></div>
</div>

const PAGE_W = 595.32, PAGE_H = 841.92;
const SCALE = 2.2; // render resolution multiplier
const FONT_PT = 11;

// Fixed corrections applied to every generated copy (not user input).
// Page 4 (Declaration of Trust) has a stray Chinese product-name overlay
// baked into the original template on top of the "Income" paragraph.
// We white it out and redraw the correct paragraph in black.
const FIXED_OVERLAYS = [
  {
    page: 4,
    whiteout: { x: 64, top: 361, width: 484, height: 34 },
    lines: [
      { text: 'Income \u2013 The Trustee shall accumulate any interest, dividend and other income to', x: 68.0, bottom: 375.3 },
      { text: 'be allocated to the trust principal.', x: 74.2, bottom: 390.4 }
    ]
  }
];

function applyFixedOverlay(ctx, pageIndex){
  const fix = FIXED_OVERLAYS.find(f => f.page === pageIndex);
  if(!fix) return;
  if(fix.whiteout){
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(fix.whiteout.x*SCALE, fix.whiteout.top*SCALE, fix.whiteout.width*SCALE, fix.whiteout.height*SCALE);
  }
  ctx.fillStyle = '#000000';
  ctx.textBaseline = 'alphabetic';
  ctx.font = `${FONT_PT*SCALE}px "Noto Sans TC", "PingFang TC", sans-serif`;
  fix.lines.forEach(line => {
    ctx.fillText(line.text, line.x*SCALE, line.bottom*SCALE - (2*SCALE*0.3));
  });
}

function b64toUint8(b64){
  const raw = atob(b64);
  const arr = new Uint8Array(raw.length);
  for(let i=0;i<raw.length;i++) arr[i] = raw.charCodeAt(i);
  return arr;
}

function setStatus(msg, cls){
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = cls || '';
}

function setProgress(pct){
  const wrap = document.getElementById('progressWrap');
  const bar = document.getElementById('progressBar');
  if(pct === null){ wrap.style.display='none'; return; }
  wrap.style.display='block';
  bar.style.width = pct + '%';
}

function formatDob(isoDate){
  if(!isoDate) return '';
  const parts = isoDate.split('-');
  if(parts.length !== 3) return isoDate;
  const [y, m, d] = parts;
  return `${y}年${m}月${d}日`;
}

function normalizePhone(raw){
  if(!raw) return '';
  let s = raw.replace(/[\s\-()]/g, '');
  if(s.startsWith('+886')) return s;
  if(s.startsWith('886')) return '+' + s;
  if(s.startsWith('0')) return '+886' + s.slice(1);
  return s;
}

function getValues(){
  const ids = ['chineseName','englishName','dob','nationality','idNumber','contactNumber','email',
    'address','occupation','industry','companyName','companyAddress',
    'beneficiaryInfo'];
  const vals = {};
  ids.forEach(id => { vals[id] = document.getElementById(id).value.trim(); });
  vals.dob = formatDob(vals.dob);
  vals.contactNumber = normalizePhone(vals.contactNumber);
  return vals;
}

function wrapText(ctx, text, maxWidth){
  if(!text) return [];
  const lines = [];
  let current = '';
  for(const ch of text){
    const test = current + ch;
    if(ctx.measureText(test).width > maxWidth && current.length > 0){
      lines.push(current);
      current = ch;
    } else {
      current = test;
    }
  }
  if(current) lines.push(current);
  return lines;
}

async function renderAllPages(onProgress){
  const values = getValues();
  const pdfBytes = b64toUint8(PDF_BASE64);
  const loadingTask = pdfjsLib.getDocument({data: pdfBytes});
  const pdfDoc = await loadingTask.promise;
  const numPages = pdfDoc.numPages;
  const canvases = [];

  for(let i=0; i<numPages; i++){
    if(onProgress) onProgress(i, numPages);

    const page = await pdfDoc.getPage(i+1);
    const viewport = page.getViewport({scale: SCALE});
    const canvas = document.createElement('canvas');
    canvas.width = viewport.width;
    canvas.height = viewport.height;
    const ctx = canvas.getContext('2d');
    await page.render({canvasContext: ctx, viewport: viewport}).promise;

    // fixed template corrections (not tied to user input)
    applyFixedOverlay(ctx, i);

    // draw overlay text for fields mapped to this page
    const entries = FIELD_MAP.filter(e => e.page === i);
    for(const e of entries){
      // always erase the original blue placeholder text first
      if(e.wx0 !== undefined){
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(e.wx0*SCALE, e.wtop*SCALE, (e.wx1-e.wx0)*SCALE, (e.wbottom-e.wtop)*SCALE);
      }
      const val = values[e.field];
      if(!val) continue;
      const fontPx = FONT_PT * SCALE;
      ctx.font = `${fontPx}px "Noto Sans TC", "PingFang TC", sans-serif`;
      ctx.fillStyle = '#1a1a8c';
      ctx.textBaseline = 'alphabetic';
      const x = e.x * SCALE;
      const yBase = e.bottom * SCALE - (2*SCALE*0.3);
      if(e.wrap){
        const lines = wrapText(ctx, val, (e.maxWidth||400) * SCALE);
        const lh = (e.lineHeight || 14) * SCALE;
        lines.forEach((line, idx) => {
          ctx.fillText(line, x, yBase + idx*lh);
        });
      } else {
        ctx.fillText(val, x, yBase);
      }
    }

    canvases.push(canvas);
  }
  return canvases;
}

async function generatePdf(){
  const btn = document.getElementById('generateBtn');
  btn.disabled = true;
  setStatus('讀取範本中...');
  setProgress(2);
  try{
    const canvases = await renderAllPages((i, total) => {
      setStatus(`處理第 ${i+1} / ${total} 頁...`);
      setProgress(5 + Math.round((i/total)*90));
    });

    const { jsPDF } = window.jspdf;
    const outDoc = new jsPDF({unit:'pt', format:[PAGE_W, PAGE_H]});
    canvases.forEach((canvas, i) => {
      const imgData = canvas.toDataURL('image/jpeg', 0.92);
      if(i > 0) outDoc.addPage([PAGE_W, PAGE_H]);
      outDoc.addImage(imgData, 'JPEG', 0, 0, PAGE_W, PAGE_H);
    });

    setProgress(100);
    setStatus('產生完成，開始下載...', 'ok');
    const values = getValues();
    const nameGuess = (values.chineseName || values.englishName || '信託投保表格').replace(/[^\w\u4e00-\u9fa5]/g,'');
    outDoc.save(`信託投保表格_${nameGuess || '未命名'}.pdf`);
    setTimeout(()=>setProgress(null), 800);
  }catch(err){
    console.error(err);
    setStatus('發生錯誤：' + err.message, 'err');
    setProgress(null);
  }finally{
    btn.disabled = false;
  }
}

async function previewPdf(){
  const btn = document.getElementById('previewBtn');
  btn.disabled = true;
  setStatus('產生預覽中...');
  setProgress(2);
  try{
    const canvases = await renderAllPages((i, total) => {
      setStatus(`處理第 ${i+1} / ${total} 頁...`);
      setProgress(5 + Math.round((i/total)*90));
    });

    const container = document.getElementById('previewPages');
    container.innerHTML = '';
    canvases.forEach((canvas, i) => {
      const wrap = document.createElement('div');
      wrap.className = 'preview-page-wrap';
      wrap.appendChild(canvas);
      container.appendChild(wrap);
      const label = document.createElement('div');
      label.className = 'preview-page-label';
      label.textContent = `第 ${i+1} / ${canvases.length} 頁`;
      container.appendChild(label);
    });

    document.getElementById('previewModal').classList.add('open');
    setStatus('');
    setProgress(null);
  }catch(err){
    console.error(err);
    setStatus('發生錯誤：' + err.message, 'err');
    setProgress(null);
  }finally{
    btn.disabled = false;
  }
}

document.getElementById('generateBtn').addEventListener('click', generatePdf);
document.getElementById('previewBtn').addEventListener('click', previewPdf);
document.getElementById('closePreviewBtn').addEventListener('click', () => {
  document.getElementById('previewModal').classList.remove('open');
});
document.getElementById('resetBtn').addEventListener('click', () => {
  document.querySelectorAll('input, textarea').forEach(el => {
    if(el.id === 'nationality'){ el.value = '台灣'; }
    else { el.value = ''; }
  });
  setStatus('已清空');
});
</script>
